                          - generic [ref=f1e146]:
                            - paragraph [ref=f1e147]: The documentation is a little vague in some parts, so I made some tests...
                            - heading "тЦ╢ Playing A Non-Looping Animation" [level=3] [ref=f1e148]
                            - paragraph [ref=f1e149]: "If an animation with looping turned off is played, then:"
                            - list [ref=f1e150]:
                              - listitem [ref=f1e151]:
                                - text: Signal
                                - code [ref=f1e152]: current_animation_changed
                                - text: "is emitted twice: once at the start of the animation,"
                                - emphasis [ref=f1e153]: before
                                - code [ref=f1e154]: animation_started
                                - text: ", and once at the end,"
                                - emphasis [ref=f1e155]: after
                                - code [ref=f1e156]: animation_finished
                                - text: . The second one has an empty string for argument.
                              - listitem [ref=f1e157]:
                                - text: Signals
                                - code [ref=f1e158]: animation_started
                                - text: and
                                - code [ref=f1e159]: animation_finished
                                - text: are emitted once each.
                            - heading "ЁЯФБ Playing A Looping Animation" [level=3] [ref=f1e160]
                            - paragraph [ref=f1e161]: "If an animation with looping turned on is played, then:"
                            - list [ref=f1e162]:
                              - listitem [ref=f1e163]:
                                - text: Signals
                                - code [ref=f1e164]: current_animation_changed
                                - text: and
                                - code [ref=f1e165]: animation_started
                                - text: are emitted once each; and
                              - listitem [ref=f1e166]:
                                - text: Signal
                                - code [ref=f1e167]: animation_finished
                                - text: is never emitted.
                            - heading "тПн Playing Another Animation" [level=3] [ref=f1e168]
                            - paragraph [ref=f1e169]: "If an animation is played while the AnimationPlayer is already playing a different animation, then:"
                            - list [ref=f1e170]:
                              - listitem [ref=f1e171]:
                                - text: Signal
                                - code [ref=f1e172]: current_animation_changed
                                - text: will be emitted once for each played animation, when they start playing, and one more time at the end of the second animation.
                              - listitem [ref=f1e173]:
                                - text: Signal
                                - code [ref=f1e174]: animation_started
                                - text: will be emitted once for each played animation.
                              - listitem [ref=f1e175]:
                                - text: Signal
                                - code [ref=f1e176]: animation_finished
                                - text: will be emitted only once when the last animation ends, assuming it doesn't have looping enabled.
                            - heading "тЖй Replaying the Same Animation" [level=3] [ref=f1e177]
                            - paragraph [ref=f1e178]:
                              - text: If an animation is played with
                              - code [ref=f1e179]: play()
                              - text: "while the AnimationPlayer is already playing that same animation, then:"
                            - list [ref=f1e180]:
                              - listitem [ref=f1e181]:
                                - text: The animation continues playing. It is not interrupted or restarted, but the speed scale is changed to the one used in the second
                                - code [ref=f1e182]: play()
                                - text: call, if it's different.
                              - listitem [ref=f1e183]:
                                - text: Contrary to what's in the documentation, the playback
                                - emphasis [ref=f1e184]: can
                                - text: be inverted in the middle of the playing animation if the
                                - code [ref=f1e185]: from_end
                                - text: parameter is
                                - code [ref=f1e186]: "true"
                                - text: and the
                                - code [ref=f1e187]: custom_speed
                                - text: is negative, or if
                                - code [ref=f1e188]: play_backwards()
                                - text: is called. You can even change the speed scale inverting the playback like this. Signals
                                - code [ref=f1e189]: current_animation_changed
                                - text: and
                                - code [ref=f1e190]: animation_finished
                                - text: will both be emitted when the animation completes by playing backwards up to the start.
                              - listitem [ref=f1e191]:
                                - text: The
                                - code [ref=f1e192]: start_time
                                - text: ","
                                - code [ref=f1e193]: end_time
                                - text: ","
                                - code [ref=f1e194]: start_marker
                                - text: ", and"
                                - code [ref=f1e195]: end_marker
                                - text: parameters of the
                                - code [ref=f1e196]: play_section_*()
                                - text: variants seem to have no effect.
                              - listitem [ref=f1e197]:
                                - text: I have not tested the behavior of the
                                - code [ref=f1e198]: custom_blend
                                - text: parameter.
                              - listitem [ref=f1e199]:
                                - text: No signals are emitted when the repeated
                                - code [ref=f1e200]: play()
                                - text: is called. The initial call to
                                - code [ref=f1e201]: play()
                                - text: emits
                                - code [ref=f1e202]: current_animation_changed
                                - text: and
                                - code [ref=f1e203]: animation_started
                                - text: once each (as normal) when the animation starts playing; and
                                - code [ref=f1e204]: current_animation_changed
                                - text: and
                                - code [ref=f1e205]: animation_finished
                                - text: are emitted once each when the animation ends.
                            - heading "ЁЯФ╜ Queueing Animations" [level=3] [ref=f1e206]
                            - paragraph [ref=f1e207]:
                              - text: If an animation is played with
                              - code [ref=f1e208]: play()
                              - text: and additional animations are queued with
                              - code [ref=f1e209]: queue()
                              - text: ", then:"
                            - list [ref=f1e210]:
                              - listitem [ref=f1e211]:
                                - text: Signal
                                - code [ref=f1e212]: animation_started
                                - text: will be emitted once for each animation when they start playing;
                              - listitem [ref=f1e213]:
                                - text: Signal
                                - code [ref=f1e214]: current_animation_changed
                                - text: will be emitted once for each animation when they start playing, and one more time, with an empty string argument, when the last one finish;
                              - listitem [ref=f1e215]:
                                - text: Signal
                                - code [ref=f1e216]: animation_changed
                                - text: will be emitted once for each queued animation, but not for the initially played animation.
                              - listitem [ref=f1e217]:
                                - text: Signal
                                - code [ref=f1e218]: animation_finished
                                - text: will be emitted only once when the last animation finishes.
                            - blockquote [ref=f1e219]:
                              - paragraph [ref=f1e220]: тД╣ Assuming none of the animations is set to loop.
                            - separator [ref=f1e221]
                            - paragraph [ref=f1e222]:
                              - text: тЪа Note that
                              - code [ref=f1e223]: animation_started
                              - text: and
                              - code [ref=f1e224]: animation_finished
                              - text: have inconsistent behavior. For example, the former plays when a new
                              - code [ref=f1e225]: play()
                              - text: call interrupts an already playing animation, and when queued animations start playing, while the later doesn't in both cases. I don't know if this inconsistency is a bug or not.
