              - paragraph [ref=e929]: A node used for animation playback.
              - generic [ref=e930]:
                - heading "Description яГБ" [level=2] [ref=e931]:
                  - text: Description
                  - link "яГБ" [ref=e932] [cursor=pointer]:
                    - /url: "#description"
                - paragraph [ref=e933]:
                  - text: An animation player is used for general-purpose playback of animations. It contains a dictionary of
                  - link "AnimationLibrary" [ref=e934] [cursor=pointer]:
                    - /url: class_animationlibrary.html#class-animationlibrary
                  - text: resources and custom blend times between animation transitions.
                - paragraph [ref=e935]:
                  - text: Some methods and properties use a single key to reference an animation directly. These keys are formatted as the key for the library, followed by a forward slash, then the key for the animation within the library, for example
                  - code [ref=e936]: "\"movement/run\""
                  - text: . If the library's key is an empty string (known as the default library), the forward slash is omitted, being the same key used by the library.
                - paragraph [ref=e937]:
                  - strong [ref=e938]: AnimationPlayer
                  - text: is better-suited than
                  - link "Tween" [ref=e939] [cursor=pointer]:
                    - /url: class_tween.html#class-tween
                  - text: for more complex animations, for example ones with non-trivial timings. It can also be used over
                  - link "Tween" [ref=e940] [cursor=pointer]:
                    - /url: class_tween.html#class-tween
                  - text: if the animation track editor is more convenient than doing it in code.
                - paragraph [ref=e941]: Updating the target properties of animations occurs at the process frame.
